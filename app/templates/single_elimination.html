<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Elimination Setup | Play Arena</title>
    <style>
        body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }

        .config-card {
            background: white; width: 100%; max-width: 480px; padding: 50px 40px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); text-align: center;
            animation: fadeIn 0.5s ease-out;
        }
        .icon-circle {
            width: 80px; height: 80px; background: #fff3e0; color: #f57c00;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; margin: 0 auto 25px auto;
        }
        h1 { color: #2d3a4b; font-size: 2rem; margin-bottom: 10px; }
        .desc { color: #6b7a8f; margin-bottom: 35px; line-height: 1.6; font-size: 1.05rem; }
        .form-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-weight: 600; color: #2d3a4b; margin-bottom: 10px; }
        select {
            width: 100%; padding: 15px; border: 2px solid #e1e4e8; border-radius: 10px;
            font-size: 1.1rem; color: #333; outline: none; transition: 0.3s;
            appearance: none; background: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23007CB2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E") no-repeat right 15px top 50%;
            background-size: 12px; background-color: #fff;
        }
        select:focus { border-color: #f57c00; box-shadow: 0 0 0 4px rgba(245, 124, 0, 0.1); }
        .btn-create {
            width: 100%; padding: 18px; background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-create:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 124, 0, 0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="wrapper">
        {% include 'navbar.html' %}
        
        <div class="main-content">
            <div class="config-card">
                <div class="icon-circle">⚡</div>
                <h1>Knockout Setup</h1>
                <div class="desc">
                    The classic Bracket format. One loss and you are out. <br>The winner takes it all.
                </div>

                <form action="/tournament/format" method="post">
                    <input type="hidden" name="format" value="single_elimination">
                    
                    <div class="form-group">
                        <label for="teams">Bracket Size</label>
                        <select name="teams" id="teams" required>
                            <option value="" disabled selected>Select size...</option>
                            <option value="4">4 Teams (Semi-Finals)</option>
                            <option value="8">8 Teams (Quarter-Finals)</option>
                            <option value="16">16 Teams (Round of 16)</option>
                            <option value="32">32 Teams</option>
                            <option value="64">64 Teams</option>
                        </select>
                    </div>

                    <button class="btn-create" type="submit">Build Bracket</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
