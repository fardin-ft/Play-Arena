<!-- Login/Create Account & Tournament Creation Page -->
<!DOCTYPE html>
<html>
<head>
    <title>Login or Create Account | Play Arena</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 28px 24px 28px;
        }
        h1 {
            text-align: center;
            color: #2d3a4b;
            margin-bottom: 18px;
        }
        .subtitle {
            text-align: center;
            color: #6b7a8f;
            margin-bottom: 28px;
            font-size: 1.05em;
        }
        .expand-btn {
            width: 100%;
            background: #4f8cff;
            color: #fff;
            border: none;
            padding: 12px 0;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
            transition: background 0.2s;
        }
        .expand-btn:hover {
            background: #376fd6;
        }
        .expand-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
            margin-bottom: 18px;
        }
        .expand-section.active {
            max-height: 400px;
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #2d3a4b;
            font-weight: 500;
        }
        input[type="text"], input[type="password"], input[type="date"], input[type="email"] {
            width: 100%;
            padding: 9px 10px;
            margin-bottom: 16px;
            border: 1px solid #cfd8dc;
            border-radius: 5px;
            font-size: 1em;
            background: #f9fafb;
            transition: border 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="date"]:focus, input[type="email"]:focus {
            border: 1.5px solid #4f8cff;
            outline: none;
        }
        .btn {
            width: 100%;
            background: #4f8cff;
            color: #fff;
            border: none;
            padding: 11px 0;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #376fd6;
        }
        .small-link {
            display: block;
            text-align: center;
            color: #4f8cff;
            text-decoration: none;
            font-size: 0.97em;
            margin-top: 8px;
        }
        .small-link:hover {
            text-decoration: underline;
        }
        .divider {
            text-align: center;
            margin: 18px 0 14px 0;
            color: #b0b8c1;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Tournament Hub</h1>
        <div class="subtitle">Sign in or create an account to start organizing your tournaments!</div>
        <button class="expand-btn" onclick="toggleSection('login-section')">Login</button>
        <div id="login-section" class="expand-section">
            <form action="/login" method="post">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" name="email" required>
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required>
                <input class="btn" type="submit" value="Login">
                <a class="small-link" href="#">Forgot password?</a>
            </form>
        </div>
        <button class="expand-btn" onclick="toggleSection('signup-section')">Create Account</button>
        <div id="signup-section" class="expand-section">
            <form action="/create_account" method="post">
                <label for="signup-email">Email</label>
                <input type="email" id="signup-email" name="email" required>
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" name="password" required>
                <input class="btn" type="submit" value="Create Account">
            </form>
        </div>
    </div>
    <script>
        function toggleSection(sectionId) {
            const login = document.getElementById('login-section');
            const signup = document.getElementById('signup-section');
            if (sectionId === 'login-section') {
                login.classList.toggle('active');
                signup.classList.remove('active');
            } else {
                signup.classList.toggle('active');
                login.classList.remove('active');
            }
        }
    </script>
</body>
</html>
